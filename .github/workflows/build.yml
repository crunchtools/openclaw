name: Build and Push OpenClaw

on:
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - 'config/**'
      - '.github/workflows/build.yml'
  workflow_call:
  workflow_dispatch:

env:
  QUAY_IMAGE: quay.io/crunchtools/openclaw
  GHCR_IMAGE: ghcr.io/crunchtools/openclaw

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version tag
        id: version
        run: |
          TAG=$(git describe --tags --always 2>/dev/null || echo "v1.0.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build image with Buildah
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: openclaw
          tags: latest ${{ steps.version.outputs.tag }} ${{ steps.version.outputs.sha_short }}
          containerfiles: ./Containerfile

      - name: Save image for Trivy scan
        run: podman save -o /tmp/openclaw.tar localhost/openclaw:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/openclaw.tar
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push to Quay.io
        if: github.event_name != 'pull_request'
        run: |
          podman tag localhost/openclaw:latest ${{ env.QUAY_IMAGE }}:latest
          podman tag localhost/openclaw:latest ${{ env.QUAY_IMAGE }}:${{ steps.version.outputs.tag }}
          podman push ${{ env.QUAY_IMAGE }}:latest
          podman push ${{ env.QUAY_IMAGE }}:${{ steps.version.outputs.tag }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          podman tag localhost/openclaw:latest ${{ env.GHCR_IMAGE }}:latest
          podman tag localhost/openclaw:latest ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.tag }}
          podman push ${{ env.GHCR_IMAGE }}:latest
          podman push ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.tag }}
